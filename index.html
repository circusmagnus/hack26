<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            width: 300px;
            height: 300px;
            border: 1px solid black;
            margin: 20px auto;
        }
        .cell {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            cursor: pointer;
        }
        .cell:hover {
            background-color: #f0f0f0;
        }
        #status {
            text-align: center;
            margin-top: 10px;
            font-size: 1.2em;
        }
        #win-counters {
            text-align: center;
            margin-top: 10px;
        }
        #win-counters span {
            margin: 0 10px;
            font-weight: bold;
        }
        #reset-button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe Game</h1>
    <div id="status">Player X's Turn</div>
    <div id="game-board">
        <!-- Game board will be rendered here -->
    </div>
    <div id="win-counters">
        <span id="human-wins">Human Wins: 0</span>
        <span id="computer-wins">Computer Wins: 0</span>
    </div>
    <button id="reset-button">Reset Game</button>
    <script src="script.js"></script>
</body>
</html>
