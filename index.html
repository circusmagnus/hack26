
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlesector Squad Damage Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Battlesector Squad Damage Calculator</h1>
        <div class="calculator-form">
            <label for="squadName">Squad Name:</label>
            <input type="text" id="squadName" value="My Squad"><br><br>

            <label for="numModels">Number of Models:</label>
            <input type="number" id="numModels" value="5"><br><br>

            <label for="damage">Damage per Model:</label>
            <input type="number" id="damage" value="10"><br><br>

            <label for="numAttacks">Number of Attacks per Model:</label>
            <input type="number" id="numAttacks" value="2"><br><br>

            <label for="accuracy">Accuracy (%):</label>
            <input type="number" id="accuracy" value="75"><br><br>

            <label for="optimalDistance">Optimal Distance:</label>
            <input type="number" id="optimalDistance" value="10"><br><br>

            <label for="accuracyFalloff">Accuracy Falloff per Tile (%):</label>
            <input type="number" id="accuracyFalloff" value="5"><br><br>

            <label for="distanceToEnemy">Distance to Enemy:</label>
            <input type="number" id="distanceToEnemy" value="10"><br><br>

            <label for="armorPiercing">Armor Piercing:</label>
            <input type="number" id="armorPiercing" value="3"><br><br>

            <label for="enemyArmor">Enemy Armor:</label>
            <input type="number" id="enemyArmor" value="5"><br><br>

            <button onclick="calculateDamage()">Calculate Damage</button>
        </div>
        <div class="result">
            <h2>Calculated Damage:</h2>
            <p id="totalDamage">0</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
