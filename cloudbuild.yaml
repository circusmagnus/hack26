steps:
- id: build
  name: gcr.io/cloud-builders/docker
  automapSubstitutions: true
  entrypoint: bash
  args:
  - '-eEuo'
  - 'pipefail'
  - '-c'
  - |-
    docker build \
      -t ${_ARTIFACT_REPO_URL}/demo:${SHORT_SHA} \
      -t ${_ARTIFACT_REPO_URL}/demo:${TAG_NAME} \
      .
- id: push
  name: gcr.io/cloud-builders/docker
  args:
  - push
  - ${_ARTIFACT_REPO_URL}/demo
  - --all-tags
- id: deploy
  name: gcr.io/cloud-builders/gcloud
  automapSubstitutions: true
  entrypoint: bash
  args:
  - '-eEuo'
  - 'pipefail'
  - '-c'
  - |-
    IMAGE_TAG=${SHORT_SHA}
    gcloud run deploy demo \
      --image ${_ARTIFACT_REPO_URL}/demo:$${IMAGE_TAG} \
      --port=8080 \
      --region ${_REGION} \
      --project ${_PROJECT_ID}
options:
  logging: CLOUD_LOGGING_ONLY
serviceAccount: ${_SA_EMAIL}
